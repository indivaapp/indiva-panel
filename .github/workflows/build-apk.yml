name: Build Android APK
# manuel tetikleme: 2026-07-15-3 (güncel APK talebi)

on:
  workflow_dispatch:
  push:
    # Bu workflow dosyası değiştiğinde (örn. ilk eklendiğinde) otomatik bir kez
    # çalışır, böylece elle "Run workflow" tetiklemeye gerek kalmaz. Sonraki
    # normal kod push'ları bunu tetiklemez.
    paths:
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: indiva-panel-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
