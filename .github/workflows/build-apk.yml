name: Build Android APK
# manuel tetikleme: 2026-07-17-11 (video takılma — önbellekleme + bitrate/kalite optimizasyonu)

on:
  workflow_dispatch:
  push:
    # Bu workflow dosyası değiştiğinde (örn. ilk eklendiğinde) otomatik bir kez
    # çalışır, böylece elle "Run workflow" tetiklemeye gerek kalmaz. Sonraki
    # normal kod push'ları bunu tetiklemez.
    paths:
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write .env (GitHub Secrets'tan)
        # .env dosyası güvenlik nedeniyle repoya hiç yüklenmiyor — bu yüzden bu
        # adım olmadan derlenen APK'larda VITE_ ile başlayan TÜM değişkenler boş
        # kalıyordu (bildirim gönderme, AI özellikleri, ImgBB yükleme sessizce/
        # anlaşılmaz şekilde bozuktu). GitHub Secrets'taki değerlerden .env
        # yeniden oluşturuluyor, tıpkı yerel .env gibi.
        run: |
          cat > .env << 'EOF'
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_CLIENT_EMAIL=${{ secrets.VITE_FIREBASE_CLIENT_EMAIL }}
          VITE_FIREBASE_PRIVATE_KEY=${{ secrets.VITE_FIREBASE_PRIVATE_KEY }}
          VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_GROQ_API_KEY=${{ secrets.VITE_GROQ_API_KEY }}
          VITE_IMGBB_API_KEY=${{ secrets.VITE_IMGBB_API_KEY }}
          VITE_GITHUB_TOKEN=${{ secrets.VITE_GITHUB_TOKEN }}
          VITE_AI_ENABLED=${{ secrets.VITE_AI_ENABLED }}
          EOF

      - name: Build web assets
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: indiva-panel-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
