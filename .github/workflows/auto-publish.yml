name: INDIVA Auto-Fetch Deals

on:
  schedule:
    # Her 30 dakikada bir, saat 10:00-00:00 arası (Türkiye saati)
    - cron: '0,30 7-20 * * *'
  workflow_dispatch:

jobs:
  fetch-deals:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libnspr4 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2 \
            libpango-1.0-0 \
            libcairo2
      
      - name: Install dependencies
        run: |
          cd scripts
          npm init -y
          npm install firebase-admin puppeteer
      
      - name: Run Auto-Fetch Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'false'
        run: node scripts/auto-fetch.js
      
      - name: Log completion
        run: echo "✅ Auto-fetch completed at $(date)"
