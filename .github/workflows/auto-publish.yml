name: INDIVA Auto-Fetch Deals

on:
  schedule:
    # Her 15 dakikada bir, saat 09:00-00:00 arası (Türkiye saati = UTC+3)
    # UTC: 06:00-21:00 = TR: 09:00-00:00
    - cron: '*/15 6-20 * * *'
  workflow_dispatch:

jobs:
  fetch-deals:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check time (skip if outside working hours)
        id: time-check
        run: |
          # Türkiye saatini al (UTC+3)
          TR_HOUR=$(TZ="Europe/Istanbul" date +%H)
          echo "Türkiye saati: $TR_HOUR:00"
          
          # 09:00-00:00 arası mı kontrol et
          if [ "$TR_HOUR" -ge 9 ] || [ "$TR_HOUR" -eq 0 ]; then
            echo "✅ Çalışma saati içinde"
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "⏭️ Çalışma saati dışında, atlanıyor"
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Checkout repository
        if: steps.time-check.outputs.should_run == 'true'
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        if: steps.time-check.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        if: steps.time-check.outputs.should_run == 'true'
        run: |
          cd scripts
          npm init -y
          npm install firebase-admin
      
      - name: Run Auto-Fetch with Gemini AI
        if: steps.time-check.outputs.should_run == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/auto-fetch.js
      
      - name: Log completion
        if: steps.time-check.outputs.should_run == 'true'
        run: echo "✅ Auto-fetch completed at $(TZ='Europe/Istanbul' date)"
