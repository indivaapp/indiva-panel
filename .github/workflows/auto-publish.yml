name: INDIVA Auto-Fetch Deals

on:
  schedule:
    # Her 30 dakikada bir, saat 10:00-00:00 arası (Türkiye saati)
    # UTC: 07:00-21:00 (Türkiye = UTC+3)
    - cron: '0,30 7-20 * * *'
  workflow_dispatch: # Manuel tetikleme

jobs:
  fetch-deals:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          cd scripts
          npm init -y
          npm install firebase-admin
      
      - name: Run Auto-Fetch Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/auto-fetch.js
      
      - name: Log completion
        run: echo "✅ Auto-fetch completed at $(date)"
