name: Auto IndirimRadar Deal Fetcher

on:
  schedule:
    - cron: '*/30 * * * *'  # Yedek: zincir kırılırsa 30 dk'da bir devreye girer
  workflow_dispatch:

# Aynı anda sadece bir run çalışsın; yenisi gelirse beklesin (iptal etmesin)
concurrency:
  group: auto-indirimradar-chain
  cancel-in-progress: false

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      actions: write  # workflow_dispatch tetiklemek için

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Cache Processed IDs
        uses: actions/cache@v4
        with:
          path: data/processed_indirimradar_ids.json
          key: indirimradar-ids-v1-${{ github.run_number }}
          restore-keys: |
            indirimradar-ids-v1-

      - name: Run Auto-IndirimRadar Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/auto-indirimradar.js

      # ~5 dakikalik bekleme artik script'in kendi icinde (bulunan urunleri
      # pencereye yayarak yayinlama sirasinda) yapiliyor - burada sadece,
      # script cok erken cokerse (orn. Firebase baglanti hatasi) art arda
      # hizli tetiklenmeyi onlemek icin kucuk bir guvenlik payi birakiyoruz.
      # Art arda 3 run da başarısız olduysa (sistemik bir hata var demektir)
      # checkChainHealth.js zinciri durdurur ve uyarı gönderir — 30 dk'lık
      # yedek schedule cron'u yine de devrede kalır (tam bir sessiz kalış olmaz).
      - name: Sonraki çalışmayı planla
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          sleep 10
          if node scripts/checkChainHealth.js auto-indirimradar.yml 3; then
            curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: token ${{ github.token }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/auto-indirimradar.yml/dispatches" \
              -d '{"ref":"main"}' \
            | grep -q "^204$" \
              && echo "✅ Sonraki run planlandı." \
              || echo "⚠️ Dispatch başarısız (yedek schedule devralır)."
          else
            echo "⛔ Zincir art arda hatalar nedeniyle durduruldu, sonraki run tetiklenmedi (30 dk'lık yedek schedule devam eder)."
          fi
