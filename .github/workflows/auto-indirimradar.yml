name: Auto IndirimRadar Deal Fetcher

on:
  schedule:
    - cron: '*/30 * * * *'  # Yedek: zincir kırılırsa 30 dk'da bir devreye girer
  workflow_dispatch:

# Aynı anda sadece bir run çalışsın; yenisi gelirse beklesin (iptal etmesin)
concurrency:
  group: auto-indirimradar-chain
  cancel-in-progress: false

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      actions: write  # workflow_dispatch tetiklemek için

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run Auto-IndirimRadar Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/auto-indirimradar.js

      # ~5 dakikalik bekleme artik script'in kendi icinde (bulunan urunleri
      # pencereye yayarak yayinlama sirasinda) yapiliyor - burada sadece,
      # script cok erken cokerse (orn. Firebase baglanti hatasi) art arda
      # hizli tetiklenmeyi onlemek icin kucuk bir guvenlik payi birakiyoruz.
      - name: Sonraki çalışmayı planla
        if: always()
        run: |
          sleep 10
          curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token ${{ github.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/auto-indirimradar.yml/dispatches" \
            -d '{"ref":"main"}' \
          | grep -q "^204$" \
            && echo "✅ Sonraki run planlandı." \
            || echo "⚠️ Dispatch başarısız (yedek schedule devralır)."
