name: Auto Akakce Deal Fetcher

on:
  schedule:
    - cron: '*/10 * * * *'  # Her 10 dakikada bir
  workflow_dispatch:

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Cache Processed IDs
        uses: actions/cache@v4
        with:
          path: data/processed_akakce_ids.json
          key: akakce-ids-v2-${{ github.run_number }}
          restore-keys: |
            akakce-ids-v2-

      - name: Run Auto-Akakce Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          # AI_ENABLED: Açıklama üretimini açar (opsiyonel, ekstra maliyet)
          # Kapalıyken sadece URL Context fetch yapılır (zorunlu maliyet)
          AI_ENABLED: ${{ secrets.AI_ENABLED || 'false' }}
        run: node scripts/auto-akakce.js
