name: Auto Brochures Collector

on:
  schedule:
    - cron: '0 3,9,15,21 * * *' # Günde 4 kez: 03:00, 09:00, 15:00, 21:00 UTC
  workflow_dispatch: # Manuel tetikleme

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run Brochure Collector
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/auto-brochures.js
