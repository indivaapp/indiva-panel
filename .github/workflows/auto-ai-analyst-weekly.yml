name: AI Analyst - Weekly

on:
  # Pazartesi 08:00 TR (UTC+3, DST yok) = Pazartesi 05:00 UTC
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run AI Analyst (weekly)
        env:
          ANALYST_MODE: weekly
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/auto-ai-analyst.js
