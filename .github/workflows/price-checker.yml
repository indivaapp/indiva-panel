name: Auto Price Checker

# TAMAMEN DURDURULDU (2026-07-13) — kullanıcı kararı: indirimradar kaynaklı
# verilerin doğruluğu yeterli, ayrı bir fiyat doğrulama taramasına gerek
# görülmedi. schedule kapalı — hiçbir otomatik run yok, Firestore okuma
# tüketmiyor. İleride tekrar gerekirse cron satırını geri açın.
on:
  # - cron: '0 5-22/3 * * *'
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run Price Checker
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # AI_ENABLED: AI tabanlı fiyat doğrulamayı açar/kapatır.
          # 'true' yapmak için GitHub repo → Settings → Secrets → Actions'a
          # AI_ENABLED secret'ı ekleyin. Yoksa keyword tabanlı HTML kontrolü kullanılır.
          AI_ENABLED: ${{ secrets.AI_ENABLED || 'false' }}
        run: node scripts/price-checker.js
