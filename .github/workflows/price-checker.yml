name: Auto Price Checker

on:
  schedule:
    - cron: '*/10 * * * *'  # Her 10 dakikada bir çalışır
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run Price Checker
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # AI_ENABLED: AI tabanlı fiyat doğrulamayı açar/kapatır.
          # 'true' yapmak için GitHub repo → Settings → Secrets → Actions'a
          # AI_ENABLED secret'ı ekleyin. Yoksa keyword tabanlı HTML kontrolü kullanılır.
          AI_ENABLED: ${{ secrets.AI_ENABLED || 'false' }}
        run: node scripts/price-checker.js
