name: Auto Onual Deal Fetcher

# TAMAMEN DURDURULDU (2026-07-13) — kullanıcı kararı: onual.com'dan yeterli/doğru
# veri çekilemiyor, indirimradar zaten ihtiyacı karşılıyor. Otomatik/zincirleme
# TETİKLEME YOK — schedule kapalı, kendi kendini tetikleyen adım tamamen
# kaldırıldı (aşağıya bakın). Bu workflow SADECE elle "Run workflow" ile
# (GitHub Actions sekmesinden) çalıştırılabilir, hiçbir otomatik run/komut
# göndermez, Firestore okuma tüketmez. İleride tekrar gerekirse:
# 1) schedule/self-chain adımını geri ekleyin, 2) ya da elle tetikleyin.
on:
  workflow_dispatch:

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Cache Processed IDs
        uses: actions/cache@v4
        with:
          path: data/processed_onual_ids.json
          key: onual-ids-v2-${{ github.run_number }}
          restore-keys: |
            onual-ids-v2-
            onual-ids-v1-

      - name: Run Auto-Onual Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          AI_ENABLED: ${{ secrets.AI_ENABLED || 'false' }}
        run: node scripts/auto-onual.js
        # NOT: Kendi kendini tetikleyen adım kasıtlı olarak kaldırıldı — bu
        # workflow artık otomatik zincirlenmiyor, hiçbir komut/istek göndermiyor.
