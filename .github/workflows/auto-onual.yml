name: Auto Onual Deal Fetcher

on:
  schedule:
    - cron: '*/30 * * * *'  # Yedek: zincir kırılırsa 30 dk'da bir devreye girer
  workflow_dispatch:

# Aynı anda sadece bir run çalışsın; yenisi gelirse beklesin (iptal etmesin)
concurrency:
  group: auto-onual-chain
  cancel-in-progress: false

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    permissions:
      actions: write  # workflow_dispatch tetiklemek için

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Cache Processed IDs
        uses: actions/cache@v4
        with:
          path: data/processed_onual_ids.json
          key: onual-ids-v2-${{ github.run_number }}
          restore-keys: |
            onual-ids-v2-
            onual-ids-v1-

      - name: Run Auto-Onual Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          AI_ENABLED: ${{ secrets.AI_ENABLED || 'false' }}
        run: node scripts/auto-onual.js

      # İş bittikten 5 dk sonra kendini tekrar tetikle — GitHub cron gecikmesini bypass eder.
      # Hata olsa bile (if: always) tetikleme gerçekleşir, zincir kırılmaz.
      - name: Sonraki çalışmayı planla (5 dk)
        if: always()
        run: |
          sleep 300
          curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token ${{ github.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/auto-onual.yml/dispatches" \
            -d '{"ref":"main"}' \
          | grep -q "^204$" \
            && echo "✅ Sonraki run planlandı." \
            || echo "⚠️ Dispatch başarısız (yedek schedule devralır)."
