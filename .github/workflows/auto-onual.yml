name: Auto Onual Deal Fetcher

on:
  schedule:
    # Her 15 dakikada bir, 05:00-23:00 UTC arası (08:00-02:00 TRT) çalış
    - cron: '*/15 5-22 * * *'
  workflow_dispatch:
    # Manuel tetikleme için

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run Auto-Onual Pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/auto-onual.js
