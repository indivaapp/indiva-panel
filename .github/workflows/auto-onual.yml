name: Auto Onual Deal Fetcher

on:
  schedule:
    - cron: '*/5 * * * *'  # Her 5 dakikada bir otomatik çalışır
  workflow_dispatch:


jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Cache Processed IDs
        uses: actions/cache@v4
        with:
          path: data/processed_onual_ids.json
          key: onual-ids-v1-${{ github.run_id }}
          restore-keys: |
            onual-ids-v1-

      - name: Run Auto-Onual Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/auto-onual.js

