<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Gemini API Test</title>
    <style>
        body {
            font-family: Arial;
            background: #1a1a2e;
            color: white;
            padding: 20px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }

        pre {
            background: #333;
            padding: 10px;
            overflow: auto;
            max-height: 300px;
        }

        .success {
            color: #4caf50;
        }

        .error {
            color: #f44336;
        }
    </style>
</head>

<body>
    <h1>🤖 Gemini API Test</h1>
    <p>API Key: <code id="apiKey">AIzaSyCs1jNYICaErkXpiOQtF9vnUx7q3YnRj44</code></p>

    <h2>Model Testleri</h2>
    <button onclick="testModel('gemini-2.0-flash')" style="background: #4caf50; color: white;">✅ Test gemini-2.0-flash
        (ÖNERİLEN)</button>
    <button onclick="testModel('gemini-2.5-flash')">Test gemini-2.5-flash</button>
    <button onclick="testModel('gemini-1.5-flash')">Test gemini-1.5-flash</button>
    <button onclick="testModel('gemini-1.5-pro')">Test gemini-1.5-pro</button>
    <button onclick="testModel('gemini-pro')">Test gemini-pro</button>
    <button onclick="testModel('gemini-1.0-pro')">Test gemini-1.0-pro</button>
    <button onclick="listModels()">📋 Tüm Modelleri Listele</button>

    <h2>Sonuç:</h2>
    <pre id="result">Test sonuçları burada görünecek...</pre>

    <script>
        const API_KEY = 'AIzaSyCs1jNYICaErkXpiOQtF9vnUx7q3YnRj44';
        const resultDiv = document.getElementById('result');

        async function testModel(modelName) {
            resultDiv.innerHTML = `Testing ${modelName}...`;
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${API_KEY}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: 'Türkçe olarak "Merhaba!" de.' }] }]
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No text';
                    resultDiv.innerHTML = `<span class="success">✅ ${modelName} ÇALIŞIYOR!</span>\n\nYanıt: ${text}\n\nFull response:\n${JSON.stringify(data, null, 2)}`;
                } else {
                    resultDiv.innerHTML = `<span class="error">❌ ${modelName} HATA: ${response.status}</span>\n\n${JSON.stringify(data, null, 2)}`;
                }
            } catch (err) {
                resultDiv.innerHTML = `<span class="error">❌ Network Error: ${err.message}</span>`;
            }
        }

        async function listModels() {
            resultDiv.innerHTML = 'Loading models...';
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`;
                const response = await fetch(url);
                const data = await response.json();

                if (response.ok) {
                    const textModels = data.models
                        .filter(m => m.supportedGenerationMethods?.includes('generateContent'))
                        .map(m => `${m.name} - ${m.displayName}`)
                        .join('\n');
                    resultDiv.innerHTML = `<span class="success">✅ Text Generation Modelleri:</span>\n\n${textModels}`;
                } else {
                    resultDiv.innerHTML = `<span class="error">❌ Error: ${JSON.stringify(data, null, 2)}</span>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `<span class="error">❌ Network Error: ${err.message}</span>`;
            }
        }
    </script>
</body>

</html>
